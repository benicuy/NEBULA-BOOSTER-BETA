<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Booster • Real Performance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Status Bar -->
    <div class="status-bar">
        <span id="currentTime">12:00</span>
        <span id="batteryLevel">🔋 85%</span>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <div>
                    <h1>Game Booster</h1>
                    <span class="device-info" id="deviceInfo">Loading...</span>
                </div>
            </div>
            <button class="menu-btn" id="menuBtn">⋮</button>
        </div>

        <!-- Permission Card (REAL) -->
        <div class="permission-card" id="permissionCard">
            <div class="perm-icon">🔓</div>
            <div class="perm-text">
                <strong>Izin Overlay Diperlukan</strong>
                <small>Agar booster muncul di atas game</small>
            </div>
            <button class="perm-btn" id="requestPermBtn">AKTIFKAN</button>
        </div>

        <!-- REAL STATS (Hardware Reading) -->
        <div class="stats-panel">
            <div class="stat-row">
                <div class="stat-box">
                    <span class="stat-label">RAM</span>
                    <span class="stat-value" id="ramTotal">--</span>
                    <span class="stat-detail" id="ramUsed">--</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">CPU</span>
                    <span class="stat-value" id="cpuCores">--</span>
                    <span class="stat-detail" id="cpuModel">--</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">STORAGE</span>
                    <span class="stat-value" id="storageTotal">--</span>
                    <span class="stat-detail" id="storageFree">--</span>
                </div>
            </div>
            
            <!-- REAL FPS Counter -->
            <div class="fps-meter">
                <div class="fps-display">
                    <span class="fps-current" id="fpsCurrent">60</span>
                    <span class="fps-max">FPS</span>
                </div>
                <div class="fps-bar">
                    <div class="fps-fill" id="fpsFill" style="width: 60%"></div>
                </div>
            </div>
        </div>

        <!-- REAL BOOST BUTTON -->
        <button class="boost-btn" id="boostBtn">
            <span class="btn-icon">🚀</span>
            <span class="btn-text">BOOST PERFORMANCE</span>
        </button>

        <!-- REAL FPS Target Slider -->
        <div class="fps-control">
            <div class="control-header">
                <span>🎯 Target FPS</span>
                <span class="target-value" id="fpsTargetValue">60</span>
            </div>
            <input type="range" class="fps-slider" id="fpsSlider" min="30" max="120" value="60" step="10">
            <div class="slider-labels">
                <span>30</span>
                <span>60</span>
                <span>90</span>
                <span>120</span>
            </div>
        </div>

        <!-- Overlay Toggle -->
        <div class="toggle-item">
            <div class="toggle-info">
                <span class="toggle-icon">🪟</span>
                <div>
                    <strong>Overlay In-Game</strong>
                    <small>Tampilkan stats di atas game</small>
                </div>
            </div>
            <label class="switch">
                <input type="checkbox" id="overlayToggle" disabled>
                <span class="slider"></span>
            </label>
        </div>

        <!-- REAL GAME LIST (Detected Games) -->
        <div class="game-section">
            <div class="section-header">
                <h3>GAME TERINSTALL</h3>
                <span class="game-count" id="gameCount">0</span>
            </div>
            <div class="game-grid" id="gameGrid">
                <div class="loading">Memindai game...</div>
            </div>
        </div>

        <!-- Recent Games -->
        <div class="recent-section">
            <h4>RECENT</h4>
            <div class="recent-list" id="recentList"></div>
        </div>
    </div>

    <!-- REAL OVERLAY (Floating Window) -->
    <div class="real-overlay" id="realOverlay">
        <div class="overlay-handle" id="overlayDrag">
            <div class="handle-dots"></div>
        </div>
        <div class="overlay-content">
            <div class="overlay-stats">
                <div class="overlay-item">
                    <span>FPS</span>
                    <span class="overlay-value" id="overlayFps">60</span>
                </div>
                <div class="overlay-item">
                    <span>RAM</span>
                    <span class="overlay-value" id="overlayRam">--</span>
                </div>
                <div class="overlay-item">
                    <span>CPU</span>
                    <span class="overlay-value" id="overlayCpu">--</span>
                </div>
            </div>
            <button class="overlay-boost" id="overlayBoost">⚡</button>
        </div>
        <div class="overlay-game" id="overlayGame"></div>
    </div>

    <!-- Menu Modal -->
    <div class="modal" id="menuModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>MENU</h3>
                <button class="close-btn" id="closeMenu">✕</button>
            </div>
            <div class="modal-body">
                <button class="menu-item" id="rescanBtn">
                    <span>🔄</span> Scan Ulang Game
                </button>
                <button class="menu-item" id="checkPermBtn">
                    <span>🔓</span> Cek Izin Overlay
                </button>
                <button class="menu-item" id="resetOverlayBtn">
                    <span>🪟</span> Reset Posisi Overlay
                </button>
                <button class="menu-item" id="clearCacheBtn">
                    <span>🗑️</span> Bersihkan Cache
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
</body>
</html>
